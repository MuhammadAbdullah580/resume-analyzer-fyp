<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login — AI Resume Analyzer</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="navbar">
    <a class="brand" href="index.html">AI Resume Analyzer</a>
    <nav><a href="register.html">Register</a></nav>
  </div>

  <div class="container">
    <div class="card auth-card">
      <h2>Login</h2>
      <div id="errorBox" class="error hidden"></div>
      <form id="loginForm">
        <label for="email">Email</label>
        <input type="email" id="email" required />

        <label for="password">Password</label>
        <input type="password" id="password" required />

        <button type="submit">Login</button>
      </form>
      <p style="margin-top:16px; font-size:0.9rem;">
        No account? <a href="register.html">Register here</a>
      </p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('errorBox');
      errorBox.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        const data = await apiRequest('/auth/login', {
          method: 'POST',
          body: { email, password }
        });
        saveSession(data.token, data.user);
        window.location.href = data.user.role === 'admin' ? 'admin/users.html' : 'dashboard.html';
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
