<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Upload Resume — AI Resume Analyzer</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="navbar">
    <a class="brand" href="dashboard.html">AI Resume Analyzer</a>
    <nav>
      <a href="dashboard.html">Dashboard</a>
      <a href="upload.html">Upload Resume</a>
      <a href="profile.html">Profile</a>
      <a href="#" id="logoutLink">Logout</a>
    </nav>
  </div>

  <div class="container">
    <div class="card" style="max-width: 520px; margin: 0 auto;">
      <h2>Upload Your Resume</h2>
      <p style="color: var(--muted); font-size: 0.9rem;">Accepted formats: PDF, DOCX. Max size: 5MB.</p>
      <div id="errorBox" class="error hidden"></div>

      <form id="uploadForm">
        <label for="resumeFile">Resume File</label>
        <input type="file" id="resumeFile" accept=".pdf,.docx" required />
        <button type="submit" id="submitBtn">Analyze Resume</button>
      </form>
      <p id="statusMsg" style="color: var(--muted); font-size: 0.9rem; margin-top: 10px;"></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script>
    requireAuth();

    document.getElementById('logoutLink').addEventListener('click', (e) => {
      e.preventDefault();
      logout();
    });

    document.getElementById('uploadForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorBox = document.getElementById('errorBox');
      const statusMsg = document.getElementById('statusMsg');
      const submitBtn = document.getElementById('submitBtn');
      errorBox.classList.add('hidden');

      const fileInput = document.getElementById('resumeFile');
      if (!fileInput.files.length) return;

      const formData = new FormData();
      formData.append('resume', fileInput.files[0]);

      submitBtn.disabled = true;
      statusMsg.textContent = 'Uploading and analyzing... this may take a few seconds.';

      try {
        const data = await apiRequest('/resumes/upload', {
          method: 'POST',
          body: formData,
          isFormData: true
        });
        window.location.href = `results.html?resumeId=${data.resumeId}`;
      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.classList.remove('hidden');
        statusMsg.textContent = '';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
